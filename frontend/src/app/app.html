<!-- Shared Header (Hidden on Login/Register) -->
<header *ngIf="!isGuestPage()" class="app-header">
  <div class="header-container container">
    
    <!-- Left: Logo & Branding -->
    <div class="header-brand" routerLink="/catalog" (click)="closeDropdown()">
      <!-- Mini logo icon -->
      <img src="logo/app-logo.svg" alt="RE-USE Logo" class="brand-icon" />
      <span class="brand-text">RE-USE</span>
    </div>

    <!-- Middle: Search Input -->
    <div class="header-search">
      <div class="search-input-wrapper">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" class="search-icon">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input 
          type="text" 
          placeholder="Buscar" 
          [ngModel]="mockService.searchQuery()"
          (ngModelChange)="mockService.searchQuery.set($event)"
          (keydown.enter)="onSearchEnter()"
          class="form-control search-bar-input"
        />
        <button 
          *ngIf="mockService.searchQuery()" 
          (click)="mockService.searchQuery.set('')"
          class="btn-clear-search"
        >
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
    </div>

    <!-- Right: User Avatar Button & Menu -->
    <div class="header-user">
      <button (click)="toggleDropdown()" class="btn-avatar-trigger" [class.active]="showDropdown()">
        <img *ngIf="mockService.currentUser()?.avatarUrl; else defaultHeaderAvatarSvg" [src]="mockService.currentUser()?.avatarUrl" class="header-avatar-img" alt="Avatar de usuario" />
        <ng-template #defaultHeaderAvatarSvg>
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </ng-template>
      </button>

      <!-- Profile Dropdown Menu (Page 4 style) -->
      <div *ngIf="showDropdown()" class="profile-dropdown-menu card-premium">
        <div class="user-brief-info">
          <p class="user-brief-name">{{ mockService.currentUser()?.name }}</p>
          <p class="user-brief-email">{{ mockService.currentUser()?.email }}</p>
        </div>
        
        <div class="dropdown-divider"></div>

        <a routerLink="/profile" (click)="closeDropdown()" class="dropdown-item">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" class="item-icon">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
          </svg>
          Editar Perfil
        </a>
        
        <a routerLink="/messages" (click)="closeDropdown()" class="dropdown-item">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" class="item-icon">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
          Mensajes
        </a>
        
        <a routerLink="/profile" [queryParams]="{ section: 'publications' }" (click)="closeDropdown()" class="dropdown-item">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" class="item-icon">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="9" y1="9" x2="15" y2="9"></line>
            <line x1="9" y1="13" x2="15" y2="13"></line>
            <line x1="9" y1="17" x2="11" y2="17"></line>
          </svg>
          Mis Publicaciones
        </a>
        
        <a routerLink="/saved" (click)="closeDropdown()" class="dropdown-item">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" class="item-icon">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
          </svg>
          Guardados
        </a>

        <div class="dropdown-divider"></div>

        <button (click)="logout()" class="dropdown-item btn-logout">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" class="item-icon">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          Cerrar Sesión
        </button>
      </div>
    </div>

  </div>
</header>

<!-- Main Router Content Outlet -->
<main class="app-main-content" [class.guest-padding]="isGuestPage()">
  <div [class.container]="!isGuestPage()">
    <router-outlet></router-outlet>
  </div>
</main>
