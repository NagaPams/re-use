<div class="login-container">
  <!-- Left Branding Side -->
  <div class="brand-side">
    <div class="software-solutions">
      <img src="logo/team-logo.svg" alt="Team Logo" class="mini-logo">
    </div>

    <div class="logo-graphic-container">
      <img src="logo/app-logo.svg" alt="RE-USE Logo" class="main-logo-graphic" />
    </div>

    <h1 class="brand-title">RE-USE</h1>
    <p class="brand-subtitle">Comprar, Vender, Regalar Componentes Electrónicos</p>
  </div>

  <!-- Right Form Side -->
  <div class="form-side">
    <div class="form-card card-premium">
      <h2 class="form-title">Iniciar Sesión</h2>

      <form (submit)="onLogin($event)" novalidate>
        <div class="form-group">
          <label for="email">Correo:</label>
          <input
            type="text"
            id="email"
            name="email"
            class="form-control"
            placeholder="ejemplo@alumno.ipn.mx"
            [(ngModel)]="email"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Contraseña:</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-control"
            placeholder="************"
            [(ngModel)]="password"
            required
          />
        </div>

        <button type="submit" class="btn-primary btn-block">Iniciar Sesión</button>
      </form>

      <div *ngIf="errorMessage" class="error-message" style="margin-top: 15px; color: #e11d48; text-align: center; font-size: 0.9rem; font-weight: 500;">
        {{ errorMessage }}
      </div>

      <div class="form-footer">
        <a routerLink="/register" class="register-link"
          >¿Eres nuevo y de ESCOM? Haz el registro aquí</a
        >
      </div>
    </div>
  </div>
</div>
